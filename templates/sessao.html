<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFluir</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #E4C5EB; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            font-family: sans-serif; 
        }
        .pixel-font { 
            font-family: 'Jersey 10', sans-serif; 
            font-size: 80px; 
            color: #FFFBFB; 
            text-shadow: 3px 3px 0 #00000033; 
            margin-bottom: 2rem; 
        }
        .card-rosa { 
            background-color: #f7a8b8; 
            color: #FFFBFB; 
            padding: 10px;
             border-radius: 10px; 
             text-align: center; 
             font-weight: bold; 
             margin-bottom: 10px; 
            }
        .input-block { 
            background-color: #c4d9ff; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px; 
            text-align: center; 
        }
        .playlist-bloco { 
            background-color: #C379B4; 
            border-radius: 15px; 
            padding: 15px; height: 300px; 
            overflow-y: auto; 
            color: white; 
        }
        .btn-config { 
            font-family: 'Jersey 10', sans-serif; 
            font-size: 40px; 
            color: #FFFBFB; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            text-decoration: none; 
            background: none; 
            border: none; 
            cursor: pointer; 
        }
        .btn-ready { color: #FFFBFB;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2); 
            
        }
    </style>
</head>
<body>
    <h1 class="pixel-font">Vamos Lá!!</h1>
    
    <form action="{{ url_for('iniciar_foco') }}" method="POST" class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="input-block">
                    <div class="card-rosa">Tempo (Minutos)</div>
                    <input type="number" name="duracao_estudo" class="form-control" value="25" required>
                </div>
                <div class="input-block">
                    <div class="card-rosa">Pausas (Minutos)</div>
                    <input type="number" name="duracao_pausa" class="form-control" value="5" required>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="playlist-bloco">
                    <h4 class="text-center">Qual Playlist Hoje?</h4>
                    <div class="list-group">
                        {% for p in playlists %}
                        <label class="list-group-item">
                            <input type="radio" name="playlist_id" value="{{ p.id }}" required> {{ p.nome }}
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between mt-5">
            <a href="{{ url_for('index') }}" class="btn-config">Voltar</a>
            <button type="submit" class="btn-config btn-ready">Pronto</button>
        </div>
    </form>
</body>
</html>
